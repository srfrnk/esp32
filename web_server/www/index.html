<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Blinds Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.5);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.3) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.3) 0, transparent 50%);
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        h1 {
            font-weight: 600;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px var(--accent-glow);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-title {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--text-color);
        }

        .card-sub {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 0.25rem;
        }

        .sparkline-card {
            grid-column: 1 / -1;
        }

        .sparkline {
            font-family: monospace;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent-color);
            white-space: pre;
            overflow-x: auto;
            width: 100%;
            text-align: center;
            padding: 1rem 0;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        .status {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <h1>ESP32 Blind Diagnostics</h1>
    <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Connecting...</span>
    </div>

    <div class="dashboard">
        <div class="card">
            <div class="card-title">Light Level</div>
            <div class="card-value" id="lightLevel">--</div>
            <div class="card-sub">Current Sensor Reading</div>
        </div>
        <div class="card">
            <div class="card-title">Target Light</div>
            <div class="card-value" id="targetLight">--</div>
            <div class="card-sub">Desired Brightness</div>
        </div>
        <div class="card">
            <div class="card-title">Blind Position</div>
            <div class="card-value" id="userPercent">--<span style="font-size: 1.5rem">%</span></div>
            <div class="card-sub">0% = Open, 100% = Closed</div>
        </div>
        <div class="card">
            <div class="card-title">Calibration</div>
            <div class="card-value" style="font-size: 1.5rem; margin-top: 0.5rem;" id="calibration">-- / --</div>
            <div class="card-sub">Min / Max Recorded</div>
        </div>
        <div class="card sparkline-card">
            <div class="card-title">Histogram</div>
            <div class="sparkline" id="sparkline">...</div>
            <div class="card-sub">Light Distribution Over Time</div>
        </div>
    </div>

    <script>
        async function fetchDiagnostics() {
            try {
                const response = await fetch('/api/diagnostics');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                document.getElementById('lightLevel').textContent = data.light_level !== null ? Math.round(data.light_level) : '--';
                document.getElementById('targetLight').textContent = data.target_light !== null ? data.target_light : '--';
                document.getElementById('userPercent').innerHTML = data.user_percent !== null ? `${Math.round(data.user_percent)}<span style="font-size: 1.5rem">%</span>` : '--';
                
                const min = data.min_light !== null ? data.min_light : '--';
                const max = data.max_light !== null ? data.max_light : '--';
                document.getElementById('calibration').textContent = `${min} / ${max}`;
                
                document.getElementById('sparkline').textContent = data.histogram_sparkline || '...';

                // Update status
                document.getElementById('statusDot').style.backgroundColor = '#10b981';
                document.getElementById('statusDot').style.boxShadow = '0 0 10px #10b981';
                document.getElementById('statusText').textContent = 'Live';
                
            } catch (error) {
                console.error('Error fetching diagnostics:', error);
                document.getElementById('statusDot').style.backgroundColor = '#ef4444';
                document.getElementById('statusDot').style.boxShadow = '0 0 10px #ef4444';
                document.getElementById('statusText').textContent = 'Disconnected';
            }
        }

        // Fetch immediately, then every 2 seconds
        fetchDiagnostics();
        setInterval(fetchDiagnostics, 2000);
    </script>
</body>
</html>
